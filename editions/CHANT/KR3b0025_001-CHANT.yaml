body:
  text: 擒龐涓擒龐涓禽龐涓昔者粱君將攻邯鄲使將軍龐涓帶甲八萬至於茬丘齊君聞之使將軍忌子帶甲八萬至競龐子攻衛將軍忌子衛救與救衛是失令田忌曰若不救衛將何為孫子曰請南攻平陵平陵其城小而縣大人眾甲兵盛東陽戰邑難攻也吾將示之疑吾攻平陵南有宋北有衛當涂有市丘是吾糧涂絕也吾將示之不智事於是徙舍而走平陵陵忌子召孫子而問曰事將何為孫子曰都大夫孰為不識事曰齊城高唐孫子曰請取所二大夫以臧都橫卷四達環涂橫卷所陳也環涂甲之所處也吾末甲勁本甲不斷環涂𣪠柀其後二大夫可殺也於是段齊城高唐為兩直將蟻傅平陵挾𦭓環涂夾擊其後齊城高唐當術而大敗將軍忌子召孫子問曰吾攻平陵不得而亡齊城高唐當術而厥事將何為孫子曰請遣輕車西馳粱郊以怒其氣分卒而從之示之寡於是為之龐子果棄其輜重兼取舍而至孫子弗息而𣪠之桂陵而禽龐涓故曰孫子之所以為者盡矣四百六見威王孫子見威王曰夫兵者非士恒埶也此先王之傅道也戰勝則所以在亡國而繼絕世也戰不勝則所以削地而危社禝也是故兵者不可不察然夫樂兵者亡而利勝者辱兵非所樂也而勝非所利也事備而后動故城小而守固者有委也卒寡而兵強者有義也夫守而无委戰而无義天下无能以固且強者堯有天下之時詘王命而弗行者七夷有二中國四故堯伐負海之國而后北方民得不苛伐共工而后兵而不起施而不用其間數年堯身衰而治屈胥天下而傳舜舜擊讙收方之宗擊歸方之羽𣪠三苗方之危亡有戶是中國有苗民存蜀為弘舜身衰而治屈胥天下而傳之禹禹鑿孟門而通大夏斬八林而焚九西面而并三苗素佚而至利也戰勝而強立故天下服矣昔者神戎戰斧遂黃帝戰蜀祿堯伐共工舜伐管湯汸桀武王伐紂帝奄反故周公淺之故曰德不若五帝而能不及三王知不若周公曰我將欲責仁義式禮樂𡸁衣常以禁爭挩此堯舜非弗欲也不可得故舉兵繩之威王問威王問齊威王問用兵孫子曰兩軍相當兩將相望皆堅而固莫敢先舉為之奈何孫子合曰以輕卒嘗之賤而勇者將之期於北毋期於得為之微陳以觸其廁是胃大得威王曰用眾用寡有道乎孫子曰有威王曰我強適弱我眾適寡用之奈何孫子再拜曰明王之問夫眾且強猶問用之則安國之道也命之曰贊師毀卒亂行以順其志則必戰矣威王曰適眾我寡適強我弱用之奈何孫子曰命曰讓威必臧其尾令之能歸長兵在前短兵在為之流弩以助其急者毋動以侍適能威王曰我出適出未知眾少用之奈何孫子命曰險成險成適將為正出為三陳一能相助可以止而止可以行而行毋求威王曰𣪠窮寇奈何孫子可以侍生計矣威王曰𣪠鈞奈何孫子曰營而離之我并卒而𣪠之毋令適知之然而不離案而止毋𣪠疑威王曰以一𣪠十有道乎孫子曰有功其无備出其不意威王曰地平卒齊合而北者何也孫子曰其陳无逢也威王曰令民素聽奈何孫子曰素信威王曰善𢦏言兵埶不窮田忌問孫子曰患兵者何也困適者何也壁延不得者何也失天者何也失地者何也失人者何也請問此六者有道乎孫子曰有患兵者地也困適者險也故曰三里洳將患軍涉將留大甲故曰患兵者地也困適者險也壁延不得者寒也奈何孫子曰鼓而坐之十而揄之田忌曰行陳已定動而令士必聽奈何孫子曰嚴而視之利田忌曰賞罰者兵之急者邪孫子曰非夫賞者所以喜眾令士忘死也罰者所以正亂令民畏上也可以益勝非其急者也田忌曰權埶謀詐兵之急者邪孫子曰非也夫權者所以聚眾也埶者所以令士必鬭也謀者所以令適无備也詐者所以困適也可以益勝非其急者也田忌忿然作色此六者皆善者所用而子大夫曰非其急者也然則其急者何也孫子曰繚適計險必察遠近將之道也必攻不守兵之急者也骨也田忌問孫子曰張軍毋戰有道孫子曰有倅險矰壘諍戒毋動毋可前毋可怒田忌曰適眾且式必戰有道乎孫子曰有埤壘廣志嚴正輯眾辟而驕之引而勞之攻其无備出其不意必以為久田忌問孫子曰錐行者何也鴈行者何也篡卒力士者何也勁弩趨發者何也剽風之陳者何也眾卒者何也孫子曰錐行者所以衝堅毀兌也鴈行者所以觸廁應也篡卒力士者所以絕陳取將也勁弩趨發者所以甘戰持久也剽風之陳者所以回也眾卒者所以分功有勝也孫子曰明主知道之將不以眾卒幾功孫子出而弟子問曰威王田忌臣主之問何如孫子曰威王問九田忌問七幾知兵矣而未達於道也吾聞素信者昌立義用兵无備者傷窮兵者亡齊三枼其憂矣善則敵為之備矣孫子曰孫子曰八陳已陳孫子曰毋侍三日也孫子曰戰威王曰道也田忌陳忌問壘陳忌問壘田忌問孫子曰吾卒少不相見處此若何曰傳令趣弩舒弓弩不禁為之奈何孫子曰明將之問也此者人之所過而不急也此之所以疾志也田忌曰可得聞乎曰可用此者所以應卒宭處隘塞死地之中也是吾所以取寵而禽泰子申也田忌曰善事已往而刑不見孫子曰疾利者所以當池也車者所以當壘也者所以當堞也發者所以當俾堄也長兵次之所以救其隋也從次之者所以為長兵也短兵次之者所以難其歸而徼其衰也弩次之者所以當投幾也中央无人故盈之以卒已定乃具其法制曰以弩次疾利然后以其法射之壘上弩戟分法曰見使枼來言而動去守五里直候令相見也高則方之下則員之夜則舉鼓晝則舉旗田忌問孫子曰子言晉邦之將荀息孫軫之於兵也未無以軍恐不守忌子曰善田忌問孫子曰子言晉邦之將荀息孫軫為晉要秦於殽潰秦軍濩三𧗿強晉終秦繆公之身秦不敢與也勁將之陳也孫子曰士卒田忌曰善獨行之將也人田忌請問兵請奈何言而後中田忌請問兵請奈何孫子請問兵傷見弗取田忌服問孫橐焉孫子曰兵之應之孫子曰伍孫子曰見之孫子以也孫孫子明之吴越言之於齊曰智孫氏之道者必合於天地孫氏者求其道國故長久孫子田忌請問智道奈何孫子而先智勝不勝之謂智道已戰而智其所所以智敵所以曰智故兵無篡卒篡卒孫子曰兵之勝在於篡卒其勇在於制其巧在於埶其利在於信其德在於道其富在於亟歸其強在於休民其傷在於數戰孫子曰德行者兵之厚積也信者兵明賞也惡戰者兵之王器也取眾者勝也孫子曰恒勝有五得主剸制勝知道勝得眾勝左右和勝糧適計險勝孫子曰恒不勝有五御將不勝不知道不勝乖將不勝不用間不勝不得眾不勝孫子曰勝在盡明賞撰卒乘敵之是胃泰武之葆孫子曰不得主弗將也令一曰信二曰忠三曰敢安忠忠王安信信賞安敢敢去不善不忠於王不敢用其兵不信於賞百生弗德不敢去不善百生弗畏二百卅五月戰月戰孫子曰間於天地之間莫貴於人戰人不單天時地利人和三者不得雖勝有央是以必付與而戰不得已而後戰故時而戰不復使其眾无方而戰者小勝以付磿者也孫子曰十戰而六勝以星也十戰而七勝以日者也十戰而八勝以月者也十戰而九勝月有十戰而十勝將善而生過者也一單所不勝者也五五者有所壹不勝故戰之道有多殺人而不得將卒者有得將卒而不得舍者有得舍而不得將軍者有復軍殺將者故得其道則雖欲生不可得也八十八陣八陳孫子曰知不足將兵自侍也勇不足將兵自廣也不知道數戰不足將兵幸也夫安萬乘國廣萬乘王全萬乘之民命者唯知道知道者上知天之道下知地之理內得其民之心外知敵之請陳則知八陳之經見勝而戰弗見而諍此王者之將也孫子曰用八陳戰者因地之利用八陳之宜用陳參分誨陳有蜂誨逢有後皆侍令而動鬭一守二以一侵適以二收適弱以亂先其選卒以乘之適強以治先其下卒以誘之車騎與戰者分以為三一在於右一在於左一在於後易則多其車險則多其騎厄則多其弩險易必知生地死地居生𣪠死二百一十四八陳地葆孫子曰凡地之道陽為表陰為裏直者為剛術者為紀紀剛則得陳乃不惑直者毛產術者半死凡戰地也日其精也八風將來必勿忘也絕水迎陵逆溜居殺地迎眾樹者鈞舉也五者皆不勝南陳之山生山也東陳之山死山也東注之水生水也北注之水死水不留死水也五地之勝曰山勝陵陵勝阜阜勝陳丘陳丘勝林平地五草之勝曰藩棘椐茅莎五壤之勝青勝黃黃勝黑黑勝赤赤勝白白勝青五地之敗曰谿川澤斥五地之殺曰天井天宛天離天天柖五墓殺地也勿居也勿也春毋將秋毋登軍與陳皆毋政前右右周毋左周地葆二百勢備埶備孫子曰夫陷齒戴角前蚤後鋸喜而合怒而𧯞天之道也不可止也故无天兵者自為備聖人之事也黃帝作劍以陳象之笄作弓弩以埶象之禹作舟車以變象之湯武作長兵以權象之凡此四者兵之用也何以知劍之為陳也旦莫服之未必用也故曰陳而不戰劍之為陳也劍无封唯孟賁之勇不敢陳无蜂非孟賁之勇也敢將而進者不智兵之至也劍无首鋌唯巧士不能進陳無後非巧士敢將而進者不知兵之請者故有蜂有後相信不動適人必走无蜂无後券不道何以知弓奴之為埶也發於肩應之間殺人百步之外不識其所道至故曰弓弩埶也何以知舟車之為變也高則何以知長兵之權也𣪠非高下非盧毀肩故曰長兵權也凡此四所循以成道也知其道者兵有功主有名用而不知其道者兵无功凡兵之道四曰陳曰埶曰變曰權察此四者所以破強適取孟將也埶者攻無備出不意中之近也視之近中之遠權者晝多旗夜多鼓所以送戰也凡此四者兵之用也皆以為用而莫勶其道得四者生失四者死兵情孫子曰若欲知兵之請弩矢其法也矢卒也弩將也發者主也矢金在前羽在後故犀而善走前重而後輕故正而聽人今治卒則後重而前輕陳之則辨趣之適則不聽人治卒不法矢也弩者將也弩張棅不正偏強偏弱而不和其兩洋之送矢也不壹矢唯輕重得前後適猶不中招也將之用心不和得猶不勝適也矢輕重得前後適而弩張正其送矢壹發者非也猶不中昭也卒輕重得前後適而將唯於兵猶不勝適也故曰弩之中穀合於四兵有功將也卒也也故曰兵勝適也不異於弩之中召也此兵之道也行篡行篡孫子曰用兵移民之道權衡也權衡所以篡賢取良也陰陽所以冣眾合適也正衡再纍暨忠是謂不窮稱鄉縣衡雖其宜也私公之財壹也夫民有不足於壽而有餘於貨者有不足於貨而有餘於壽者唯明王聖人智之故能留之死者不毒奪者不溫此無窮民皆盡力近者弗則遠者無能貨多則辨辨則民不德其上貨少則則天下以為尊然則為民賕也吾所以為賕也此兵之久也用兵之國之葆也殺士殺士孫子曰明爵祿而士死明賞罰士死立必審而行之士死死撟而下之士死之士死而傳勉之驩或死州之親或死賁墓之或死飲食處之安或死疾疢之問或死延氣延氣孫子曰合軍聚眾務在激氣復徙合軍務在治兵利氣臨竞近適務在癘氣戰日有期務在斷氣今日將戰務在氣以威三軍之士所以敫氣也將軍令其令所以利氣也將軍乃短衣絜裘以勸士志所以厲氣也將軍令令軍人人為三日糧國人家為望國使毋來軍使毋往所以斷氣也將軍召將衛人者而告之曰飲食毋所以氣也延氣營也以易營之眾而貴武適必敗氣不利則拙拙則不及不及則失利失利氣不癘則聶聶則眾眾氣不斷則迵迵則不槫易散臨難易散必敗氣不則隋隋則難使難使則不可以合旨則不智為已之節不智為已之節則事而弗救身死家殘將軍召使而勉之擊官一官一孫子曰凡處卒利陳體甲兵者立官則以身宜賤令以采章乘削以倫物序行以制卒以周閭授正以鄉曲辯疑以旌輿申令以金鼓齊兵以從𨒪庵結以人雄邋軍以索陳茭肄以囚逆陳師以危射戰以雲陳圉裹以羸渭取喙以闔燧即敗以包奔救以皮傅燥戰以錯行用以正用輕以正散攻兼用行城地用方迎陵而陳用刲險用圜交易武退用兵陳臨用方翼氾戰接厝用喙逢囚險解谷以遠草駔沙荼以陽削戰勝而陳以奮國而為畏以山胠秦𢂀以委施便罷以鴈行險厄以雜管還退以蓬錯繞山林以曲次襲國邑以水則辯夜退以明簡夜敬以傳節厝入內寇以棺士遇短兵以必輿火輸積以車陳刃以錐行陳少卒以合雜合雜所以圉裹也脩行連削所以結陳也雲折重雜所權趮也猋凡振陳所以乘疑也隱匿謀𧧻所以釣戰也龍隋陳伏所以山鬭也乖舉所以厭津也卒所以也不意侍卒所以昧戰也遏溝陳所以合少也疏削明旗所以疑適也陳車所以從遺也椎下移師所以備強也浮沮而翼所以燧鬭也襌避所以莠𣠞也澗練便所以逆喙也堅陳敦所以攻槥也楑㡭藩薄所以泫疑也偽遺小亡所以聭敵也重害所以茭也順明到聲所以夜軍也佰奉離積所以利勝也剛者所以圉劫也更者所以過也者所以圉也者所以也序者所以厭門也胡退入所以解困也令以金雲陳圉裹以羸渭取喙以闔荼以陽削戰畏以山胠秦𢂀以委施便罷以鴈夜退以明簡夜敬輿火輸積以車陳龍隋陳也疏削明也澗練便所以逆喙也㡭藩薄所以泫疑也偽遺小亡所以聭敵也重害所奉離積所以利所以圉也者所以也序者所以厭五教法孫子曰善教者於本不臨軍而變故曰五教處國之教一行行之教一處軍之教一處陣之教一隱而不相見利戰之教一處國之教奚如曰孝弟良五德者士无壹乎雖能射不登車是故善射為左善御為御畢母為右然則三人安車五人安伍十人為列百人為卒千人有鼓萬人為戎而眾大可用也處國之教如此行行之教奚如廢車罷馬將軍之人必任焉所以𧗿險幼將自立焉所以敬足矣行行之教如此處軍之教奚如也處軍之教如此處陣之教奚如兵革車甲陳之器也以興善然而陳暨利而陳實蘩處陳之教如此隱而不相見利戰之教奚如五教法壘涂道使三軍之士皆見死而不見生所以𨪤所以教耳也所以教足也五教暨至目益明強兵威王問孫子曰齊士教寡人強兵者皆不同道有教寡人以正教者有教寡人以斂者有教寡人以散糧者有教寡人以靜者孫子曰皆非強兵之急者也威王孫子曰富國威王曰富國厚威王宣王以勝諸侯至於將勝之此齊之所以大敗燕眾乃知之此齊之所以大敗楚人反知之此齊之所以大敗趙人於齧桑而禽氾皋也禽唐也禽睘
